name: Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "name=$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.name }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.check.outputs.should_release == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        if: steps.check.outputs.should_release == 'true'
        run: chmod +x gradlew

      - name: Read NDK version
        if: steps.check.outputs.should_release == 'true'
        id: ndk
        run: echo "version=$(grep '^ndk = ' gradle/libs.versions.toml | sed -E 's/.*"(.+)".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Install NDK
        if: steps.check.outputs.should_release == 'true'
        run: sdkmanager --install "ndk;${{ steps.ndk.outputs.version }}"

      - name: Run full verification before publishing
        if: steps.check.outputs.should_release == 'true'
        run: ./gradlew build spotlessCheck --stacktrace

      - name: Publish to Maven Central
        if: steps.check.outputs.should_release == 'true'
        # Publishes every module with an offlinecap.publish convention plugin applied
        # (offlinecap-core/-audio/-scribe/-lingua/offlinecap); sample and build-logic are
        # not publishable and are skipped automatically.
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Create GitHub release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: v${{ steps.version.outputs.name }}
          generate_release_notes: true
